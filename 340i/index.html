<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMW 340i | Born to Perform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <main>
    <!-- Navbar -->
    <header>
      <div class="flex">
        <div class="bars">
          <div></div>
          <div></div>
        </div>
        <a href="#">M3.40</a>
      </div>
      <div class="logo">
        BMW
      </div>
      <div class="menu">
        <a href="#">Performance</a>
        <a href="#">Configure</a>
      </div>
    </header>

    <!-- Hero Section -->
    <section class="hero-section">
      <div class="video-wrapper">
        <div class="video-inner">
          <video width="100%" height="100%" muted loop autoplay playsinline>
            <source src="images/167659-837413029_medium.mp4" type="video/mp4">
          </video>
        </div>
      </div>
      <div class="inner-box">
        <div class="gallery">
          <div class="col col-1">
            <img src="images/gleb-paniotov-bLXT73MqkBc-unsplash.jpg" loading="lazy" class="large">
            <img src="images/gleb-paniotov-N7s9_2o7-Nk-unsplash.jpg" loading="lazy" class="small">
          </div>
          <div class="col col-2"></div>
          <div class="col col-3">
            <img src="images/ivan-kohut-fngi9wSSpms-unsplash.jpg" loading="lazy" class="small">
            <img src="images/kenny-iuPn0EqOTf8-unsplash.jpg" loading="lazy" class="large">
          </div>
        </div>
      </div>
      <div class="hero-content">
        <h1>Born Bold</h1>
        <div class="hero-divider"></div>
        <div class="bottom">
          <img src="./images/arrow-down.png" class="arrow">
          <div class="subtext">Scroll to explore</div>
        </div>
      </div>
    </section>

    <!-- Section 2: Performance -->
    <section class="feature-section section-perf">
      <div class="section-label">02 — Performance</div>
      <div class="section-heading-wrap">
        <h2 class="section-heading">Built to<br>Dominate</h2>
      </div>
      <div class="duo-gallery">
        <div class="duo-img duo-left">
          <img src="images/lukas-cerkauskas-u0AE8ruESfY-unsplash.jpg" loading="lazy">
        </div>
        <div class="duo-img duo-right">
          <img src="images/martin-katler-5syKZoJoKWk-unsplash.jpg" loading="lazy">
        </div>
      </div>
      <div class="section-footer">
        <span>3.0L TwinPower Turbo</span>
        <span>382 HP</span>
        <span>0–60 in 4.2s</span>
      </div>
    </section>

    <!-- Section 3: Interior -->
    <section class="feature-section section-interior">
      <div class="section-label">03 — Interior</div>
      <div class="section-heading-wrap">
        <h2 class="section-heading">Crafted<br>Within</h2>
      </div>
      <div class="trio-gallery">
        <div class="trio-img trio-top">
          <img src="images/maximilian-hille-PG18FhDVlvw-unsplash.jpg" loading="lazy">
        </div>
        <div class="trio-img trio-mid">
          <img src="images/alexandr_bendus-6PMsXs0heLo-unsplash.jpg" loading="lazy">
        </div>
        <div class="trio-img trio-bot">
          <img src="images/alexandr_bendus-A6aKVs_U7xc-unsplash.jpg" loading="lazy">
        </div>
      </div>
      <div class="section-footer">
        <span>Merino Leather</span>
        <span>14.9" Curved Display</span>
        <span>Harman Kardon Audio</span>
      </div>
    </section>

    <!-- Section 4: CTA -->
    <section class="cta-section">
      <div class="cta-bg">
        <img src="images/christian-wiediger-kPtEZFDTd7E-unsplash.jpg" loading="lazy">
      </div>
      <div class="cta-content">
        <div class="section-label cta-label">04 — Yours</div>
        <h2 class="cta-heading">Your 340i<br>Awaits</h2>
        <div class="divider cta-divider"></div>
        <div class="cta-actions">
          <a href="#" class="cta-btn primary">Build &amp; Price</a>
          <a href="#" class="cta-btn secondary">Find a Dealer</a>
        </div>
      </div>
    </section>

  </main>

  <!-- gsap cdn -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/SplitText.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
